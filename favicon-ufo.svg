<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="UFO"
>
  <defs>
    <linearGradient
      id="dome"
      x1="32"
      y1="14"
      x2="32"
      y2="34"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#4DE7E4"/>
      <stop offset="0.52" stop-color="#1CCFC8"/>
      <stop offset="1" stop-color="#0C7E78"/>
    </linearGradient>

    <linearGradient
      id="body"
      x1="32"
      y1="29"
      x2="32"
      y2="51"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#5B4057"/>
      <stop offset="0.58" stop-color="#3B2B40"/>
      <stop offset="1" stop-color="#271C2D"/>
    </linearGradient>
  </defs>

  <!-- Glass dome -->
  <path
    d="M19.5 32.5C20.2 20.2 24.8 14 32 14s11.8 6.2 12.5 18.5Z"
    fill="url(#dome)"
    stroke="#0C0B10"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Dome shadow -->
  <path
    d="M23 30.5C23.8 21.9 27.1 17.7 32 17.7c-4.1 2.7-6.1 7.1-6.4 12.8Z"
    fill="#0B5F63"
    opacity="0.55"
  />

  <!-- Dome highlight -->
  <path
    d="M36.5 18.4c3.7 1.5 5.1 4.4 5.6 7.4-2.9-2.4-5.2-4.8-5.6-7.4Z"
    fill="#ABF8F4"
    opacity="0.72"
  />

  <ellipse
    cx="40.4"
    cy="20.7"
    rx="2.2"
    ry="1.25"
    transform="rotate(32 40.4 20.7)"
    fill="#FFFFFF"
  />

  <!-- Upper collar -->
  <path
    d="M14.5 31.5C19.4 28.8 25.2 28 32 28s12.6.8 17.5 3.5l-2.2 7.4H16.7Z"
    fill="#4A3349"
    stroke="#0C0B10"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <path
    d="M18.8 32.4C22.7 30.7 27.1 30.1 32 30.1s9.3.6 13.2 2.3"
    fill="none"
    stroke="#8C5C72"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Main saucer body -->
  <path
    d="
      M3.5 39.3
      C8.1 34.5 16.9 31.7 32 31.7
      S55.9 34.5 60.5 39.3
      C61.7 40.6 61.8 42.3 60.7 43.7
      C56.8 48.8 45.8 51.2 32 51.2
      S7.2 48.8 3.3 43.7
      C2.2 42.3 2.3 40.6 3.5 39.3
      Z
    "
    fill="url(#body)"
    stroke="#0C0B10"
    stroke-width="2.7"
    stroke-linejoin="round"
  />

  <!-- Teal rim -->
  <path
    d="M4.7 43.4C12.2 47.3 21.5 48.7 32 48.7s19.8-1.4 27.3-5.3"
    fill="none"
    stroke="#1CCFC8"
    stroke-width="2.8"
    stroke-linecap="round"
  />

  <path
    d="M7.7 46.1C15.3 49.5 23.4 50.6 32 50.6s16.7-1.1 24.3-4.5"
    fill="none"
    stroke="#0C7E78"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- Upper teal lights -->
  <circle
    cx="20.5"
    cy="34.7"
    r="1.65"
    fill="#1CCFC8"
    stroke="#0C0B10"
    stroke-width="1.15"
  />

  <circle
    cx="32"
    cy="34"
    r="1.65"
    fill="#1CCFC8"
    stroke="#0C0B10"
    stroke-width="1.15"
  />

  <circle
    cx="43.5"
    cy="34.7"
    r="1.65"
    fill="#1CCFC8"
    stroke="#0C0B10"
    stroke-width="1.15"
  />

  <!-- Amber portholes -->
  <g stroke="#120505" stroke-width="1.7">
    <circle cx="15" cy="40.3" r="3.55" fill="#FDC062"/>
    <circle cx="32" cy="41.4" r="3.8" fill="#FDC062"/>
    <circle cx="49" cy="40.3" r="3.55" fill="#FDC062"/>
  </g>

  <!-- Porthole highlights -->
  <g fill="#FFFFFF" opacity="0.9">
    <circle cx="16" cy="39.2" r="1"/>
    <circle cx="33.1" cy="40.1" r="1.05"/>
    <circle cx="50" cy="39.2" r="1"/>
  </g>

  <!-- Underside -->
  <path
    d="
      M13.2 49.4
      C18.4 54.4 25.1 56.8 32 56.8
      S45.6 54.4 50.8 49.4
      C45.2 50.7 38.9 51.3 32 51.3
      S18.8 50.7 13.2 49.4
      Z
    "
    fill="#1E2D3C"
    stroke="#0C0B10"
    stroke-width="2.1"
    stroke-linejoin="round"
  />

  <!-- Bottom emitter -->
  <ellipse
    cx="32"
    cy="55.7"
    rx="8.5"
    ry="2.1"
    fill="#1CCFC8"
    stroke="#0C0B10"
    stroke-width="1.6"
  />

  <ellipse
    cx="32"
    cy="55.1"
    rx="4.3"
    ry="0.8"
    fill="#ABF8F4"
    opacity="0.85"
  />
</svg>
